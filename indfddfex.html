<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator de Links</title>
<script>
    function extrairLinks() {
        var url = document.getElementById("url").value;
        
        fetch(url)
            .then(response => response.text())
            .then(data => {
                var doc = new DOMParser().parseFromString(data, "text/html");
                var links = doc.querySelectorAll("a");
                var linksArray = Array.from(links).map(link => link.href);
                document.getElementById("result").innerText = linksArray.join("\n");
            })
            .catch(error => console.error('Erro:', error));
    }
</script>
</head>
<body>
<h1>Extrator de Links</h1>
<p>Insira a URL do site abaixo:</p>
<input type="text" id="url" placeholder="Insira a URL">
<button onclick="extrairLinks()">Extrair Links</button>
<div id="result"></div>
</body>
</html>
